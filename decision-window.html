<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Decision Window | Coach Kurtis</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: #0D0D0D; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const C = {
  bg:"#0D0D0D", surface:"#111111", card:"#161616", border:"#222222",
  red:"#CC0000", redGlow:"rgba(204,0,0,0.25)", redDim:"rgba(204,0,0,0.10)",
  green:"#00cc66", greenDim:"rgba(0,204,102,0.10)",
  white:"#FFFFFF", muted:"#666666", subtle:"#2a2a2a", text:"#cccccc",
};

const TABS = [
  { id:"intro",   label:"OVERVIEW", num:"00", color:C.red      },
  { id:"read",    label:"READ",     num:"01", color:C.red      },
  { id:"decide",  label:"DECIDE",   num:"02", color:"#ff6b35"  },
  { id:"execute", label:"EXECUTE",  num:"03", color:C.green    },
];

function AnimCard({ children, height=280 }) {
  return (
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:28,height,position:"relative",overflow:"hidden",marginBottom:24}}>
      {children}
    </div>
  );
}

function IntroAnim() {
  const [on, setOn] = useState(false);
  useEffect(() => { setTimeout(() => setOn(true), 200); }, []);
  return (
    <AnimCard height={260}>
      <style>{`
        @keyframes ballTravel { 0%{left:8%;opacity:0} 15%{opacity:1} 100%{left:80%;opacity:1} }
      `}</style>
      <div style={{position:"absolute",bottom:70,left:"8%",right:"8%",height:2,background:C.subtle}}/>
      <div style={{position:"absolute",bottom:62,width:20,height:20,borderRadius:"50%",background:C.red,boxShadow:`0 0 12px ${C.red}`,animation:on?"ballTravel 3s ease-in-out infinite":"none"}}/>
      <div style={{position:"absolute",bottom:82,left:"28%",right:"24%",height:90,border:`1.5px dashed ${C.red}`,borderBottom:"none",borderRadius:"4px 4px 0 0",opacity:on?1:0,transition:"opacity 0.8s ease 0.5s"}}>
        <div style={{position:"absolute",top:-24,left:"50%",transform:"translateX(-50%)",background:C.red,color:"#fff",fontSize:9,fontFamily:"monospace",letterSpacing:2,padding:"3px 10px",borderRadius:3,whiteSpace:"nowrap"}}>THE WINDOW</div>
      </div>
      <svg style={{position:"absolute",bottom:62,right:"8%",opacity:on?1:0,transition:"opacity 0.5s ease 0.3s"}} width="32" height="65" viewBox="0 0 32 65">
        <circle cx="16" cy="9" r="7" fill="none" stroke={C.muted} strokeWidth="1.5"/>
        <line x1="16" y1="16" x2="16" y2="42" stroke={C.muted} strokeWidth="2"/>
        <line x1="5" y1="28" x2="27" y2="28" stroke={C.muted} strokeWidth="2"/>
        <line x1="9" y1="60" x2="16" y2="42" stroke={C.muted} strokeWidth="2"/>
        <line x1="23" y1="60" x2="16" y2="42" stroke={C.muted} strokeWidth="2"/>
      </svg>
      {[{l:"Ball leaves foot",p:"8%",d:"1.2s"},{l:"Read",p:"29%",d:"1.4s"},{l:"Decide",p:"46%",d:"1.6s"},{l:"Execute",p:"63%",d:"1.8s"}].map((x,i)=>(
        <div key={i} style={{position:"absolute",bottom:24,left:x.p,fontSize:8,fontFamily:"monospace",color:C.muted,letterSpacing:1,opacity:on?1:0,transition:`opacity 0.5s ease ${x.d}`,whiteSpace:"nowrap"}}>{x.l}</div>
      ))}
      <div style={{position:"absolute",top:18,left:24,right:24,fontSize:12,color:C.muted,fontFamily:"monospace",letterSpacing:0.5,lineHeight:1.7,opacity:on?1:0,transition:"opacity 0.6s ease 2s"}}>
        The window opens when the ball leaves a teammate's foot.<br/>
        <span style={{color:C.red}}>Everything inside it determines what comes next.</span>
      </div>
    </AnimCard>
  );
}

function ReadAnim() {
  const [on, setOn] = useState(false);
  useEffect(() => { setTimeout(() => setOn(true), 200); }, []);
  const Player = ({x, sideOn, label, sublabel, color}) => (
    <g>
      {sideOn
        ? <path d={`M${x},65 L${x-80},5 L${x+25},5 Z`} fill={`${color}12`} stroke={color} strokeWidth="0.8" strokeDasharray="4,3" style={{opacity:on?1:0,transition:"opacity 0.8s ease 1s"}}/>
        : <path d={`M${x},65 L${x-22},5 L${x+22},5 Z`} fill={`${color}12`} stroke={color} strokeWidth="0.8" strokeDasharray="4,3" style={{opacity:on?1:0,transition:"opacity 0.8s ease 1s"}}/>
      }
      <circle cx={x} cy={55} r={14} fill="none" stroke={color} strokeWidth="1.5" style={{opacity:on?1:0,transition:"opacity 0.5s ease 0.3s"}}/>
      <line x1={x} y1={69} x2={x} y2={112} stroke={color} strokeWidth="2" style={{opacity:on?1:0,transition:"opacity 0.5s ease 0.4s"}}/>
      {sideOn
        ? <line x1={x-20} y1={86} x2={x+20} y2={94} stroke={color} strokeWidth="2" style={{opacity:on?1:0,transition:"opacity 0.5s ease 0.5s"}}/>
        : <line x1={x-20} y1={90} x2={x+20} y2={90} stroke={color} strokeWidth="2" style={{opacity:on?1:0,transition:"opacity 0.5s ease 0.5s"}}/>
      }
      <line x1={x-12} y1={140} x2={x} y2={112} stroke={color} strokeWidth="2" style={{opacity:on?1:0,transition:"opacity 0.5s ease 0.6s"}}/>
      <line x1={x+12} y1={140} x2={x} y2={112} stroke={color} strokeWidth="2" style={{opacity:on?1:0,transition:"opacity 0.5s ease 0.6s"}}/>
      <text x={x} y={162} textAnchor="middle" fill={color} fontSize="11" fontFamily="monospace" letterSpacing="1" style={{opacity:on?1:0}}>{label}</text>
      <text x={x} y={177} textAnchor="middle" fill={C.muted} fontSize="9" fontFamily="monospace" style={{opacity:on?1:0}}>{sublabel}</text>
      <text x={x} y={28} textAnchor="middle" fontSize="14" style={{opacity:on?1:0,transition:"opacity 0.5s ease 1.3s"}}>{sideOn?"✓":"✗"}</text>
    </g>
  );
  return (
    <AnimCard height={250}>
      <svg width="100%" height="100%" viewBox="0 0 500 200" preserveAspectRatio="xMidYMid meet">
        <line x1="250" y1="5" x2="250" y2="195" stroke={C.subtle} strokeWidth="1" strokeDasharray="4,4"/>
        <line x1="30" y1="150" x2="220" y2="150" stroke={C.subtle} strokeWidth="1"/>
        <line x1="280" y1="150" x2="470" y2="150" stroke={C.subtle} strokeWidth="1"/>
        <Player x={120} sideOn={false} label="SQUARE ON" sublabel="Limited vision" color={C.red}/>
        <Player x={380} sideOn={true}  label="SIDE ON"   sublabel="Full picture"   color={C.green}/>
        <text x={120} y={197} textAnchor="middle" fill={C.subtle} fontSize="8" fontFamily="monospace">X MISTAKE</text>
        <text x={380} y={197} textAnchor="middle" fill={C.subtle} fontSize="8" fontFamily="monospace">✓ INTELLIGENT</text>
      </svg>
    </AnimCard>
  );
}

function DecideAnim() {
  const [on, setOn] = useState(false);
  useEffect(() => { setTimeout(() => setOn(true), 200); }, []);
  return (
    <AnimCard height={240}>
      <style>{`@keyframes ballRoll2{0%{left:7%}100%{left:79%}}`}</style>
      <div style={{position:"absolute",top:"50%",left:"7%",right:"7%",height:2,background:C.subtle,transform:"translateY(-50%)"}}/>
      <div style={{position:"absolute",top:"calc(50% - 10px)",width:20,height:20,borderRadius:"50%",background:"#ff6b35",boxShadow:"0 0 10px #ff6b35",animation:on?"ballRoll2 3s ease-in-out infinite":"none"}}/>
      <div style={{position:"absolute",top:"15%",left:"28%",width:"44%",height:"70%",border:"1.5px dashed #ff6b35",borderRadius:6,background:"rgba(255,107,53,0.06)",opacity:on?1:0,transition:"opacity 0.6s ease 0.4s"}}>
        <div style={{position:"absolute",top:-22,left:"50%",transform:"translateX(-50%)",fontSize:9,fontFamily:"monospace",color:"#ff6b35",letterSpacing:2,whiteSpace:"nowrap"}}>DECISION WINDOW</div>
      </div>
      {[{l:"Ball leaves foot",p:"7%",d:"0.5s"},{l:"Window opens",p:"28%",d:"0.8s"},{l:"Window closes",p:"68%",d:"1.1s"},{l:"Ball arrives",p:"79%",d:"1.4s"}].map((x,i)=>(
        <div key={i} style={{position:"absolute",bottom:18,left:x.p,fontSize:8,fontFamily:"monospace",color:C.muted,letterSpacing:1,whiteSpace:"nowrap",opacity:on?1:0,transition:`opacity 0.5s ease ${x.d}`}}>{x.l}</div>
      ))}
      <div style={{position:"absolute",top:14,left:"7%",width:"18%",background:"rgba(204,0,0,0.08)",border:"1px solid rgba(204,0,0,0.25)",borderRadius:6,padding:"6px 8px",opacity:on?1:0,transition:"opacity 0.5s ease 1.5s"}}>
        <div style={{fontSize:8,color:C.red,fontFamily:"monospace",letterSpacing:1,marginBottom:3}}>X WAITS</div>
        <div style={{fontSize:8,color:C.muted,lineHeight:1.5}}>Decides after arrival. Window closed. Pressure wins.</div>
      </div>
      <div style={{position:"absolute",top:14,right:"7%",width:"18%",background:C.greenDim,border:"1px solid rgba(0,204,102,0.25)",borderRadius:6,padding:"6px 8px",opacity:on?1:0,transition:"opacity 0.5s ease 1.8s"}}>
        <div style={{fontSize:8,color:C.green,fontFamily:"monospace",letterSpacing:1,marginBottom:3}}>✓ DECIDES</div>
        <div style={{fontSize:8,color:C.muted,lineHeight:1.5}}>Decides in transit. Arrives already knowing.</div>
      </div>
    </AnimCard>
  );
}

function ExecuteAnim() {
  const [on, setOn] = useState(false);
  useEffect(() => { setTimeout(() => setOn(true), 200); }, []);
  return (
    <AnimCard height={260}>
      <style>{`@keyframes arrowPulse{0%,100%{opacity:0.3}50%{opacity:1}}`}</style>
      <svg width="100%" height="100%" viewBox="0 0 520 235" preserveAspectRatio="xMidYMid meet">
        <line x1="260" y1="5" x2="260" y2="228" stroke={C.subtle} strokeWidth="1" strokeDasharray="4,4"/>
        <text x="130" y="22" textAnchor="middle" fill={C.red} fontSize="10" fontFamily="monospace" letterSpacing="1">X FRONT FOOT</text>
        <g style={{opacity:on?1:0,transition:"opacity 0.5s ease 0.3s"}}>
          <circle cx="110" cy="55" r="13" fill="none" stroke={C.red} strokeWidth="1.5"/>
          <line x1="110" y1="68" x2="110" y2="108" stroke={C.red} strokeWidth="2"/>
          <line x1="90" y1="84" x2="130" y2="84" stroke={C.red} strokeWidth="2"/>
          <line x1="110" y1="108" x2="93" y2="134" stroke={C.red} strokeWidth="2.5"/>
          <line x1="110" y1="108" x2="127" y2="134" stroke={C.subtle} strokeWidth="2"/>
          <circle cx="85" cy="138" r="9" fill={C.red} opacity="0.85"/>
          <path d="M85,148 Q65,164 76,180" fill="none" stroke={C.red} strokeWidth="1.5" strokeDasharray="3,2" opacity="0.7"/>
          <path d="M76,180 Q94,192 110,180" fill="none" stroke={C.red} strokeWidth="1.5" strokeDasharray="3,2" opacity="0.7"/>
          <text x="80" y="210" textAnchor="middle" fill={C.red} fontSize="8" fontFamily="monospace" opacity="0.8">Extra touches. Window closed.</text>
        </g>
        <text x="390" y="22" textAnchor="middle" fill={C.green} fontSize="10" fontFamily="monospace" letterSpacing="1">✓ BACK FOOT</text>
        <g style={{opacity:on?1:0,transition:"opacity 0.5s ease 0.5s"}}>
          <circle cx="370" cy="55" r="13" fill="none" stroke={C.green} strokeWidth="1.5"/>
          <line x1="370" y1="68" x2="370" y2="108" stroke={C.green} strokeWidth="2"/>
          <line x1="350" y1="84" x2="390" y2="84" stroke={C.green} strokeWidth="2"/>
          <line x1="370" y1="108" x2="353" y2="134" stroke={C.subtle} strokeWidth="2"/>
          <line x1="370" y1="108" x2="387" y2="134" stroke={C.green} strokeWidth="2.5"/>
          <circle cx="390" cy="138" r="9" fill={C.green} opacity="0.85"/>
          <path d="M396,132 L445,98" fill="none" stroke={C.green} strokeWidth="2.5" style={{animation:on?"arrowPulse 1.5s ease-in-out infinite":"none"}}/>
          <polygon points="445,93 454,103 441,106" fill={C.green} opacity="0.9"/>
          <text x="390" y="210" textAnchor="middle" fill={C.green} fontSize="8" fontFamily="monospace" opacity="0.8">One touch. Into space. Window open.</text>
        </g>
        <line x1="30" y1="148" x2="240" y2="148" stroke={C.subtle} strokeWidth="1"/>
        <line x1="280" y1="148" x2="490" y2="148" stroke={C.subtle} strokeWidth="1"/>
      </svg>
    </AnimCard>
  );
}

function Bullets({ items, color }) {
  return (
    <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:24}}>
      {items.map((item,i) => (
        <div key={i} style={{display:"flex",gap:12,alignItems:"flex-start"}}>
          <div style={{width:7,height:7,borderRadius:2,background:color,flexShrink:0,marginTop:6}}/>
          <p style={{fontSize:15,color:C.text,lineHeight:1.75,margin:0}} dangerouslySetInnerHTML={{__html:item}}/>
        </div>
      ))}
    </div>
  );
}

function Takeaway({ text, color }) {
  return (
    <div style={{background:"#080808",border:`1px solid ${color}40`,borderLeft:`3px solid ${color}`,borderRadius:8,padding:"16px 20px",display:"flex",gap:14,alignItems:"flex-start"}}>
      <span style={{fontSize:22,flexShrink:0}}>💡</span>
      <div>
        <div style={{fontSize:9,fontFamily:"monospace",letterSpacing:2.5,color,textTransform:"uppercase",marginBottom:6}}>THE TAKEAWAY</div>
        <p style={{fontSize:14,color:C.text,lineHeight:1.7,margin:0}}>{text}</p>
      </div>
    </div>
  );
}

const SECTIONS = {
  intro:{
    num:"00",color:C.red,
    headline:["The moment that separates"," intelligent players from the rest"],
    subtitle:"Every time the ball travels toward a player, a window opens.",
    Animation:IntroAnim,
    bullets:[
      "The window opens the moment the ball <strong style='color:#ffffff'>leaves a teammate's foot</strong> — not when it arrives.",
      "Inside that window, three things must happen in sequence: Read, Decide, Execute.",
      "Most players waste the window. They wait for the ball to arrive before they start thinking.",
      "Game intelligent players use the window. By the time the ball arrives, <strong style='color:#ffffff'>the next action is already decided.</strong>",
      "This is not a talent. It is a trainable skill — and the right environment either develops it or ignores it.",
    ],
    takeaway:"The Decision Window is not about speed. It is about using the time that already exists before the ball arrives.",
  },
  read:{
    num:"01",color:C.red,
    headline:["See the picture"," before the ball arrives"],
    subtitle:"The window opens. The first job is to build a picture of what is around you.",
    Animation:ReadAnim,
    bullets:[
      "<strong style='color:#ffffff'>Body position is the foundation.</strong> A square-on stance cuts the visual field in half before the ball even moves.",
      "Side-on means one shoulder open to the field. This single adjustment doubles what the player can see.",
      "The common mistake is facing the ball directly — it looks attentive but eliminates awareness of everything else.",
      "Players who scan consistently before receiving appear to have more time. They do not. They have <strong style='color:#ffffff'>more information.</strong>",
      "What a player sees in the moment before the ball arrives determines the quality of every decision that follows.",
    ],
    takeaway:"Side-on is not a technical preference. It is the physical act of opening the window.",
  },
  decide:{
    num:"02",color:"#ff6b35",
    headline:["The next action is chosen"," before the ball arrives"],
    subtitle:"Reading without deciding is just watching. The window is already closing.",
    Animation:DecideAnim,
    bullets:[
      "The most common mistake at this stage: <strong style='color:#ffffff'>not having a picture before the ball arrives.</strong>",
      "When a player waits until the ball reaches them to start thinking, the window has already closed — pressure has arrived first.",
      "An intelligent player decides in transit. While the ball is still travelling, the next action is already selected.",
      "This is why intelligent players appear calm under pressure. They are not reacting. <strong style='color:#ffffff'>They have already decided.</strong>",
      "The first touch should set up a decision already made — not begin the process of making one.",
    ],
    takeaway:"If the decision is still being made when the ball arrives, the window was wasted.",
  },
  execute:{
    num:"03",color:C.green,
    headline:["The right touch"," keeps the window open"],
    subtitle:"Execution is where the decision either lives or dies.",
    Animation:ExecuteAnim,
    bullets:[
      "A poor first touch collapses everything that came before it — no matter how good the read or the decision was.",
      "<strong style='color:#ffffff'>Front foot when moving forward forces an extra touch.</strong> That touch delays the situation and invites the press.",
      "Back foot reception when the intention is forward: one touch, into space, in the direction already decided.",
      "The extra touch is not just a technical error. It is a sign the player did not decide before the ball arrived.",
      "When Read, Decide and Execute work together, the game moves at <strong style='color:#ffffff'>the player's pace</strong> — not against them.",
    ],
    takeaway:"The back foot is not a preference. It is the execution of a decision already made in the window.",
  },
};

function App() {
  const [active, setActive] = useState("intro");
  const section = SECTIONS[active];
  const tab = TABS.find(t => t.id === active);
  const { Animation } = section;

  return (
    <div style={{minHeight:"100vh",background:C.bg,backgroundImage:"linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px)",backgroundSize:"28px 28px",fontFamily:"'Segoe UI',system-ui,sans-serif",color:C.white}}>

      {/* HEADER */}
      <div style={{background:"#080808",borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 36px 0"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:C.red,boxShadow:`0 0 8px ${C.red}`}}/>
            <span style={{fontSize:10,letterSpacing:3,color:C.muted,fontFamily:"monospace",textTransform:"uppercase"}}>Coach Kurtis</span>
            <span style={{color:C.subtle,fontSize:10,fontFamily:"monospace"}}>/</span>
            <span style={{fontSize:10,letterSpacing:2,color:"#CC000090",fontFamily:"monospace",textTransform:"uppercase"}}>Game Intelligence</span>
          </div>
          <div style={{fontSize:9,color:C.subtle,fontFamily:"monospace",letterSpacing:2}}>coachkurtis.com</div>
        </div>
        <div style={{padding:"20px 36px 0"}}>
          <h1 style={{fontSize:46,fontWeight:800,lineHeight:1.05,letterSpacing:-1.5,marginBottom:8}}>
            The <span style={{color:C.red}}>Decision</span> Window
          </h1>
          <p style={{fontSize:15,color:C.muted,letterSpacing:0.2}}>
            What happens in the seconds before your child receives the ball determines everything that comes after it.
          </p>
        </div>
        <div style={{display:"flex",gap:4,padding:"16px 36px 0",overflowX:"auto"}}>
          {TABS.map(t => {
            const isActive = t.id === active;
            return (
              <button key={t.id} onClick={()=>setActive(t.id)} style={{background:isActive?C.surface:"transparent",color:isActive?C.white:"rgba(255,255,255,0.35)",border:isActive?`1px solid ${t.color}`:"1px solid rgba(255,255,255,0.1)",borderBottom:isActive?`1px solid ${C.surface}`:"1px solid rgba(255,255,255,0.1)",borderRadius:"6px 6px 0 0",padding:"8px 20px",cursor:"pointer",fontSize:10,fontFamily:"monospace",letterSpacing:1.5,fontWeight:700,whiteSpace:"nowrap",transition:"all 0.2s"}}>
                {t.num} — {t.label}
              </button>
            );
          })}
        </div>
      </div>

      {/* CONTENT */}
      <div style={{padding:"36px 36px 56px",maxWidth:860,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16}}>
          <div style={{width:48,height:48,borderRadius:8,flexShrink:0,background:tab.color,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{fontSize:18,fontWeight:800,color:"#fff"}}>{section.num}</span>
          </div>
          <div>
            <div style={{fontSize:9,fontFamily:"monospace",letterSpacing:3,color:tab.color,textTransform:"uppercase",marginBottom:4}}>SECTION {section.num}</div>
            <h2 style={{fontSize:28,fontWeight:800,lineHeight:1.15,letterSpacing:-0.5}}>
              <span style={{color:tab.color}}>{section.headline[0]}</span>{section.headline[1]}
            </h2>
          </div>
        </div>
        <p style={{fontSize:16,color:C.muted,marginBottom:24,fontStyle:"italic"}}>{section.subtitle}</p>
        <Animation key={active}/>
        <Bullets items={section.bullets} color={tab.color}/>
        <Takeaway text={section.takeaway} color={tab.color}/>
        {active==="execute" && (
          <div style={{marginTop:28,background:C.redDim,border:"1px solid rgba(204,0,0,0.3)",borderRadius:8,padding:"18px 24px"}}>
            <div style={{fontSize:9,fontFamily:"monospace",letterSpacing:2.5,color:C.red,marginBottom:8,textTransform:"uppercase"}}>Free Resource</div>
            <p style={{fontSize:14,color:C.text,lineHeight:1.7,margin:"0 0 10px"}}>Get the Decision Window cheat sheet — one page, all three stages, what to look for at the touchline. Free inside the Game Intelligence Lab.</p>
            <div style={{fontSize:11,color:C.red,fontFamily:"monospace",letterSpacing:1.5}}>skool.com/ngc-player-lab-5149 →</div>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
