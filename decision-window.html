<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Decision Window | Coach Kurtis</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: #080808; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
// ─── DECISION WINDOW ──────────────────────────────────────
const dwStages = [
  {id:0,label:"INTRO",title:"The Decision Window",subtitle:"The moment that separates intelligent players from the rest",description:"Every time the ball travels toward a player, a window opens. A brief moment where everything that happens next is decided. Most players waste it. Game intelligent players own it.",color:"#CC0000"},
  {id:1,label:"01 — READ",title:"Read",subtitle:"See the picture before the ball arrives",description:"The window opens the moment the ball leaves the previous player's foot. Before it arrives, the intelligent player is already scanning — building a picture of what is around them.",mistake:{label:"Common Mistake",text:"Standing square on. Body facing the ball directly, which cuts off the visual field. The player can only see what is in front of them — not the space, not the teammates, not the press."},fix:{label:"What Good Looks Like",text:"Side-on body position. One shoulder open to the field. This single adjustment doubles what the player can see before the ball even arrives."},color:"#CC0000",visual:"read"},
  {id:2,label:"02 — DECIDE",title:"Decide",subtitle:"The next action is chosen before the ball arrives",description:"Reading without deciding is just watching. The intelligent player uses the picture they have built to make a decision — before the ball reaches them. The window is already closing.",mistake:{label:"Common Mistake",text:"Not having a picture before the ball arrives. The player waits for the ball to reach them before they start thinking. By then the window has closed and pressure has arrived."},fix:{label:"What Good Looks Like",text:"The decision is made in transit. By the time the ball arrives, the player already knows what they are doing next. Their first touch sets up the action they decided on before the ball got there."},color:"#CC0000",visual:"decide"},
  {id:3,label:"03 — EXECUTE",title:"Execute",subtitle:"The right touch makes the decision possible",description:"Execution is where the decision either lives or dies. A poor first touch collapses everything that came before it — no matter how good the read or the decision was.",mistake:{label:"Common Mistake",text:"Receiving on the wrong foot when the intention is to go forward. Taking the ball on the front foot forces an extra touch, which delays the situation, invites pressure, and wastes the window entirely."},fix:{label:"What Good Looks Like",text:"Receive on the back foot when moving forward. One touch, into space, in the direction of the decision already made. The window stays open. The game moves at the player's pace, not against them."},color:"#CC0000",visual:"execute"},
  {id:4,label:"SUMMARY",title:"Own the Window",subtitle:"Three stages. One moment. Game intelligence.",description:"The Decision Window is not a talent. It is a skill. Players who read early, decide before arrival, and execute with the right touch consistently perform above their level — in any game, against any opponent.",isSummary:true,color:"#CC0000"},
];

function BodyDiagram({type}) {
  if(type==="read") return (
    <svg viewBox="0 0 200 220" style={{width:"100%",maxHeight:"170px"}}>
      <rect x="10" y="10" width="180" height="200" rx="4" fill="none" stroke="#ffffff10" strokeWidth="1"/>
      <circle cx="55" cy="80" r="14" fill="#CC000020" stroke="#CC0000" strokeWidth="1.5"/>
      <line x1="55" y1="94" x2="55" y2="130" stroke="#CC0000" strokeWidth="2"/>
      <line x1="35" y1="108" x2="75" y2="108" stroke="#CC0000" strokeWidth="2"/>
      <line x1="45" y1="150" x2="55" y2="130" stroke="#CC0000" strokeWidth="2"/>
      <line x1="65" y1="150" x2="55" y2="130" stroke="#CC0000" strokeWidth="2"/>
      <path d="M55,80 L25,40 L85,40 Z" fill="#CC000015" stroke="#CC0000" strokeWidth="0.5" strokeDasharray="3,2"/>
      <text x="55" y="170" textAnchor="middle" fill="#CC0000" fontSize="9" fontFamily="monospace">SQUARE ON</text>
      <text x="55" y="182" textAnchor="middle" fill="#CC000090" fontSize="7.5" fontFamily="monospace">Limited vision</text>
      <line x1="100" y1="20" x2="100" y2="195" stroke="#ffffff15" strokeWidth="1" strokeDasharray="4,3"/>
      <circle cx="145" cy="80" r="14" fill="#00ff8820" stroke="#00ff88" strokeWidth="1.5"/>
      <line x1="145" y1="94" x2="145" y2="130" stroke="#00ff88" strokeWidth="2"/>
      <line x1="128" y1="105" x2="162" y2="111" stroke="#00ff88" strokeWidth="2"/>
      <line x1="138" y1="150" x2="145" y2="130" stroke="#00ff88" strokeWidth="2"/>
      <line x1="155" y1="150" x2="145" y2="130" stroke="#00ff88" strokeWidth="2"/>
      <path d="M145,80 L100,30 L190,55 Z" fill="#00ff8812" stroke="#00ff88" strokeWidth="0.5" strokeDasharray="3,2"/>
      <text x="145" y="170" textAnchor="middle" fill="#00ff88" fontSize="9" fontFamily="monospace">SIDE ON</text>
      <text x="145" y="182" textAnchor="middle" fill="#00ff8890" fontSize="7.5" fontFamily="monospace">Full picture</text>
      <text x="55" y="205" textAnchor="middle" fill="#ffffff40" fontSize="7" fontFamily="monospace">X MISTAKE</text>
      <text x="145" y="205" textAnchor="middle" fill="#ffffff40" fontSize="7" fontFamily="monospace">✓ INTELLIGENT</text>
    </svg>
  );
  if(type==="decide") return (
    <svg viewBox="0 0 200 220" style={{width:"100%",maxHeight:"170px"}}>
      <rect x="10" y="10" width="180" height="200" rx="4" fill="none" stroke="#ffffff10" strokeWidth="1"/>
      <line x1="20" y1="110" x2="180" y2="110" stroke="#ffffff20" strokeWidth="1"/>
      <circle cx="30" cy="110" r="7" fill="#CC0000" opacity="0.9"/>
      <text x="30" y="128" textAnchor="middle" fill="#ffffff60" fontSize="7" fontFamily="monospace">BALL LEAVES</text>
      <line x1="42" y1="110" x2="155" y2="110" stroke="#ffffff30" strokeWidth="1.5" strokeDasharray="5,3"/>
      <circle cx="165" cy="110" r="12" fill="#ffffff10" stroke="#ffffff40" strokeWidth="1.5"/>
      <rect x="42" y="75" width="113" height="25" rx="3" fill="#CC000010" stroke="#CC0000" strokeWidth="0.8" strokeDasharray="3,2"/>
      <text x="98" y="87" textAnchor="middle" fill="#CC0000" fontSize="8" fontFamily="monospace">THE DECISION WINDOW</text>
      <rect x="20" y="140" width="75" height="55" rx="3" fill="#CC000008" stroke="#CC000040" strokeWidth="1"/>
      <text x="57" y="154" textAnchor="middle" fill="#CC0000" fontSize="7.5" fontFamily="monospace">X WAITS</text>
      <text x="57" y="166" textAnchor="middle" fill="#ffffff50" fontSize="6.5" fontFamily="monospace">Ball arrives first.</text>
      <text x="57" y="177" textAnchor="middle" fill="#ffffff50" fontSize="6.5" fontFamily="monospace">Window closed.</text>
      <text x="57" y="188" textAnchor="middle" fill="#ffffff50" fontSize="6.5" fontFamily="monospace">Pressure arrives.</text>
      <rect x="105" y="140" width="75" height="55" rx="3" fill="#00ff8808" stroke="#00ff8840" strokeWidth="1"/>
      <text x="142" y="154" textAnchor="middle" fill="#00ff88" fontSize="7.5" fontFamily="monospace">✓ DECIDES</text>
      <text x="142" y="166" textAnchor="middle" fill="#ffffff50" fontSize="6.5" fontFamily="monospace">In transit.</text>
      <text x="142" y="177" textAnchor="middle" fill="#ffffff50" fontSize="6.5" fontFamily="monospace">Arrives knowing</text>
      <text x="142" y="188" textAnchor="middle" fill="#ffffff50" fontSize="6.5" fontFamily="monospace">next action.</text>
    </svg>
  );
  if(type==="execute") return (
    <svg viewBox="0 0 200 220" style={{width:"100%",maxHeight:"170px"}}>
      <rect x="10" y="10" width="180" height="200" rx="4" fill="none" stroke="#ffffff10" strokeWidth="1"/>
      <text x="55" y="28" textAnchor="middle" fill="#CC0000" fontSize="8" fontFamily="monospace">X FRONT FOOT</text>
      <circle cx="55" cy="55" r="11" fill="#CC000020" stroke="#CC0000" strokeWidth="1.5"/>
      <line x1="55" y1="66" x2="55" y2="95" stroke="#CC0000" strokeWidth="2"/>
      <line x1="38" y1="78" x2="72" y2="78" stroke="#CC0000" strokeWidth="2"/>
      <line x1="55" y1="95" x2="45" y2="115" stroke="#CC0000" strokeWidth="2"/>
      <line x1="55" y1="95" x2="65" y2="115" stroke="#ffffff40" strokeWidth="2"/>
      <circle cx="38" cy="118" r="6" fill="#CC0000" opacity="0.8"/>
      <text x="30" y="158" fill="#CC000090" fontSize="6.5" fontFamily="monospace">Extra touches.</text>
      <text x="30" y="168" fill="#CC000090" fontSize="6.5" fontFamily="monospace">Window closed.</text>
      <text x="30" y="178" fill="#CC000090" fontSize="6.5" fontFamily="monospace">Pressure wins.</text>
      <line x1="100" y1="20" x2="100" y2="195" stroke="#ffffff15" strokeWidth="1" strokeDasharray="4,3"/>
      <text x="148" y="28" textAnchor="middle" fill="#00ff88" fontSize="8" fontFamily="monospace">✓ BACK FOOT</text>
      <circle cx="148" cy="55" r="11" fill="#00ff8820" stroke="#00ff88" strokeWidth="1.5"/>
      <line x1="148" y1="66" x2="148" y2="95" stroke="#00ff88" strokeWidth="2"/>
      <line x1="131" y1="78" x2="165" y2="78" stroke="#00ff88" strokeWidth="2"/>
      <line x1="148" y1="95" x2="158" y2="115" stroke="#00ff88" strokeWidth="2.5"/>
      <line x1="148" y1="95" x2="138" y2="115" stroke="#ffffff40" strokeWidth="2"/>
      <circle cx="165" cy="118" r="6" fill="#00ff88" opacity="0.8"/>
      <text x="118" y="158" fill="#00ff8890" fontSize="6.5" fontFamily="monospace">One touch.</text>
      <text x="118" y="168" fill="#00ff8890" fontSize="6.5" fontFamily="monospace">Into space.</text>
      <text x="118" y="178" fill="#00ff8890" fontSize="6.5" fontFamily="monospace">Window stays open.</text>
    </svg>
  );
  return null;
}

function DecisionWindow() {
  const [current, setCurrent] = useState(0);
  const [visible, setVisible] = useState(true);
  const stage = dwStages[current];

  const goTo = (index) => {
    if(index===current) return;
    setVisible(false);
    setTimeout(()=>{setCurrent(index);setVisible(true);},280);
  };
  const next = () => { if(current<dwStages.length-1) goTo(current+1); };
  const prev = () => { if(current>0) goTo(current-1); };

  return (
    <div style={{minHeight:"100vh",background:"#0a0a0a",display:"flex",flexDirection:"column",fontFamily:"Georgia, serif",color:"#ffffff",position:"relative"}}>
      <div style={{position:"absolute",inset:0,backgroundImage:"radial-gradient(circle at 20% 20%, #CC000008 0%, transparent 50%), radial-gradient(circle at 80% 80%, #CC000005 0%, transparent 50%)",pointerEvents:"none"}}/>

      {/* Top bar */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 32px",borderBottom:"1px solid #ffffff10",position:"relative",zIndex:2}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:"#CC0000",boxShadow:"0 0 8px #CC0000"}}/>
          <span style={{fontSize:11,letterSpacing:3,color:"#ffffff60",fontFamily:"monospace",textTransform:"uppercase"}}>Coach Kurtis</span>
        </div>
        <div style={{fontSize:10,letterSpacing:2,color:"#CC0000",fontFamily:"monospace",textTransform:"uppercase"}}>Game Intelligence Framework</div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {dwStages.map((s,i)=>(
            <button key={i} onClick={()=>goTo(i)} style={{width:i===current?20:6,height:6,borderRadius:3,background:i===current?"#CC0000":i<current?"#CC000050":"#ffffff20",border:"none",cursor:"pointer",transition:"all 0.3s ease",padding:0}}/>
          ))}
        </div>
      </div>

      {/* Main content */}
      <div style={{flex:1,display:"flex",flexDirection:"column",padding:"32px 48px",position:"relative",zIndex:2,transition:"opacity 0.28s ease",opacity:visible?1:0}}>
        {stage.label && <div style={{fontSize:10,letterSpacing:4,color:"#CC0000",fontFamily:"monospace",textTransform:"uppercase",marginBottom:12}}>{stage.label}</div>}
        <h1 style={{fontSize:stage.id===0||stage.isSummary?48:42,fontWeight:700,margin:"0 0 8px 0",lineHeight:1.1,letterSpacing:-1}}>{stage.title}</h1>
        <p style={{fontSize:16,color:"#CC0000",margin:"0 0 20px 0",fontStyle:"italic"}}>{stage.subtitle}</p>
        <p style={{fontSize:15,lineHeight:1.75,color:"#ffffffb0",maxWidth:600,margin:"0 0 28px 0"}}>{stage.description}</p>

        {stage.visual && (
          <div style={{display:"flex",gap:24,flex:1,alignItems:"flex-start"}}>
            <div style={{width:200,height:200,background:"#ffffff05",border:"1px solid #ffffff15",borderRadius:8,padding:8,flexShrink:0}}>
              <BodyDiagram type={stage.visual}/>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:12,flex:1}}>
              {stage.mistake && (
                <div style={{background:"#CC000010",border:"1px solid #CC000035",borderRadius:8,padding:"16px 20px"}}>
                  <div style={{fontSize:9,letterSpacing:3,color:"#CC0000",fontFamily:"monospace",textTransform:"uppercase",marginBottom:8}}>X {stage.mistake.label}</div>
                  <p style={{fontSize:13,lineHeight:1.7,color:"#ffffffa0",margin:0}}>{stage.mistake.text}</p>
                </div>
              )}
              {stage.fix && (
                <div style={{background:"#00ff8808",border:"1px solid #00ff8830",borderRadius:8,padding:"16px 20px"}}>
                  <div style={{fontSize:9,letterSpacing:3,color:"#00ff88",fontFamily:"monospace",textTransform:"uppercase",marginBottom:8}}>✓ {stage.fix.label}</div>
                  <p style={{fontSize:13,lineHeight:1.7,color:"#ffffffa0",margin:0}}>{stage.fix.text}</p>
                </div>
              )}
            </div>
          </div>
        )}

        {stage.isSummary && (
          <div>
            <div style={{display:"flex",gap:16,marginBottom:24}}>
              {[dwStages[1],dwStages[2],dwStages[3]].map((s,i)=>(
                <div key={i} style={{border:`1px solid ${["#CC0000","#ff6b35","#00ff88"][i]}30`,background:`${["#CC0000","#ff6b35","#00ff88"][i]}08`,borderRadius:8,padding:"16px 20px",flex:1}}>
                  <div style={{color:["#CC0000","#ff6b35","#00ff88"][i],fontSize:10,fontFamily:"monospace",letterSpacing:2,marginBottom:6}}>0{i+1}</div>
                  <div style={{color:"#ffffff",fontSize:15,fontWeight:700,marginBottom:6}}>{s.title}</div>
                  <div style={{color:"#ffffff80",fontSize:11,lineHeight:1.6}}>{s.subtitle}</div>
                </div>
              ))}
            </div>
            <div style={{background:"#CC000015",border:"1px solid #CC000040",borderRadius:8,padding:"16px 24px",maxWidth:560}}>
              <div style={{fontSize:9,letterSpacing:3,color:"#CC0000",fontFamily:"monospace",marginBottom:8}}>FREE RESOURCE</div>
              <p style={{fontSize:14,lineHeight:1.7,color:"#ffffffb0",margin:0}}>Get the Decision Window cheat sheet — one page, all three stages, what to look for at the touchline. Free inside the Game Intelligence Lab.</p>
              <div style={{marginTop:10,fontSize:11,color:"#CC0000",fontFamily:"monospace",letterSpacing:2}}>skool.com/ngc-player-lab-5149 →</div>
            </div>
          </div>
        )}

        {stage.id===0 && (
          <div style={{display:"flex",gap:16,marginTop:8}}>
            {["Read","Decide","Execute"].map((lbl,i)=>(
              <div key={i} onClick={()=>goTo(i+1)} style={{padding:"12px 24px",border:"1px solid #ffffff20",borderRadius:6,cursor:"pointer",fontSize:13,color:"#ffffff80",fontFamily:"monospace",letterSpacing:1,background:"#ffffff05"}}>
                0{i+1} — {lbl}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Bottom nav */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 32px",borderTop:"1px solid #ffffff10",position:"relative",zIndex:2}}>
        <button onClick={prev} disabled={current===0} style={{padding:"10px 24px",background:"transparent",border:"1px solid #ffffff20",color:current===0?"#ffffff20":"#ffffff60",borderRadius:4,cursor:current===0?"default":"pointer",fontSize:11,fontFamily:"monospace",letterSpacing:2}}>← PREV</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:9,letterSpacing:3,color:"#ffffff30",fontFamily:"monospace",marginBottom:4}}>{current+1} of {dwStages.length}</div>
          <div style={{width:120,height:2,background:"#ffffff10",borderRadius:1,overflow:"hidden"}}>
            <div style={{width:`${((current+1)/dwStages.length)*100}%`,height:"100%",background:"#CC0000",transition:"width 0.3s ease",boxShadow:"0 0 6px #CC0000"}}/>
          </div>
        </div>
        <button onClick={next} disabled={current===dwStages.length-1} style={{padding:"10px 24px",background:current===dwStages.length-1?"transparent":"#CC0000",border:`1px solid ${current===dwStages.length-1?"#CC000030":"#CC0000"}`,color:current===dwStages.length-1?"#CC000040":"#ffffff",borderRadius:4,cursor:current===dwStages.length-1?"default":"pointer",fontSize:11,fontFamily:"monospace",letterSpacing:2}}>NEXT →</button>
      </div>
    </div>
  );
}

function App() { return <DecisionWindow/>; }

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
