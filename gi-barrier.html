const sharedCard = {minHeight:"100vh",background:"#080808",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px 16px",fontFamily:"'Segoe UI',system-ui,sans-serif"};
const card = {background:"#0f0f0f",border:"1px solid #1a1a1a",borderRadius:"20px",padding:"40px 36px",maxWidth:"540px",width:"100%",position:"relative",overflow:"hidden"};

const btn = {background:"#e63329",color:"#fff",border:"none",borderRadius:"10px",padding:"15px 28px",fontSize:"14px",fontWeight:"700",cursor:"pointer",width:"100%",letterSpacing:"0.3px"};
const inputStyle = (err) => ({background:"#0a0a0a",border:`1px solid ${err?"#e63329":"#1c1c1c"}`,borderRadius:"9px",padding:"13px 15px",color:"#fff",fontSize:"14px",width:"100%",outline:"none",boxSizing:"border-box",marginBottom:"4px"});

const divider = {height:"1px",background:"#181818",margin:"24px 0"};

async function sendToMailerLite(formData) {
  try {
    await fetch("https://connect.mailerlite.com/api/subscribers", {
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":`Bearer ${MAILERLITE_API_KEY}`},
      body: JSON.stringify({email:formData.email,name:formData.name,groups:[NGC_GROUP_ID],fields:{child_name:formData.childName,child_age:formData.childAge}})
    });
  } catch(e) { console.error(e); }
}

function GateForm({ onSubmit, title, sub }) {
  const [formData, setFormData] = useState({name:"",email:"",childName:"",childAge:""});
  const [errors, setErrors] = useState({});
  const validate = () => {
    const e = {};
    if(!formData.name.trim()) e.name="Required";
    if(!formData.email.trim()||!/\S+@\S+\.\S+/.test(formData.email)) e.email="Valid email required";
    if(!formData.childName.trim()) e.childName="Required";
    if(!formData.childAge.trim()) e.childAge="Required";
    return e;
  };
  const handle = async () => {
    const e = validate();
    if(Object.keys(e).length>0){setErrors(e);return;}
    await sendToMailerLite(formData);
    onSubmit(formData);
  };
  return (
    <div>
      <div style={chip()}>{sub}</div>
      <h1 style={{...h1,fontSize:"21px"}}>{title}</h1>
      <div style={{marginBottom:"14px"}}>
        <label style={label}>Your Name</label>
        <input style={inputStyle(errors.name)} placeholder="Your full name" value={formData.name} onChange={e=>setFormData({...formData,name:e.target.value})}/>
        {errors.name && <div style={{color:"#e63329",fontSize:"11px",marginBottom:"8px"}}>{errors.name}</div>}
      </div>
      <div style={{marginBottom:"14px"}}>
        <label style={label}>Your Email</label>
        <input style={inputStyle(errors.email)} placeholder="your@email.com" type="email" value={formData.email} onChange={e=>setFormData({...formData,email:e.target.value})}/>
        {errors.email && <div style={{color:"#e63329",fontSize:"11px",marginBottom:"8px"}}>{errors.email}</div>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"14px"}}>
        <div>
          <label style={label}>Child's Name</label>
          <input style={inputStyle(errors.childName)} placeholder="First name" value={formData.childName} onChange={e=>setFormData({...formData,childName:e.target.value})}/>
          {errors.childName && <div style={{color:"#e63329",fontSize:"11px"}}>{errors.childName}</div>}
        </div>
        <div>
          <label style={label}>Child's Age</label>
          <input style={inputStyle(errors.childAge)} placeholder="Age" type="number" min="6" max="18" value={formData.childAge} onChange={e=>setFormData({...formData,childAge:e.target.value})}/>
          {errors.childAge && <div style={{color:"#e63329",fontSize:"11px"}}>{errors.childAge}</div>}
        </div>
      </div>
      <button style={btn} onClick={handle}>Reveal My Child's Result</button>
      <p style={{color:"#444",fontSize:"11px",textAlign:"center",marginTop:"12px"}}>No spam. Your details are safe with us.</p>
      <p style={{color:"#444",fontSize:"11px",textAlign:"center",marginTop:"6px"}}>Check your junk or spam folder if you do not see an email from us.</p>
    </div>
  );

// ─── GI BARRIER ───────────────────────────────────────────
const barrierQuestions = [
  {id:"q1",text:"In matches, how does your child perform compared to training?",options:[{text:"Much quieter and less involved than in training",type:"confidence"},{text:"Makes rushed decisions they wouldn't make in training",type:"decision"},{text:"Performs similarly but lacks that extra level",type:"environment"},{text:"Good some weeks, completely off others",type:"consistency"}]},
  {id:"q2",text:"When your child makes a mistake in a game, what usually happens next?",options:[{text:"They go quiet and avoid getting involved for a while",type:"confidence"},{text:"They rush their next action trying to make up for it",type:"decision"},{text:"They reset fairly quickly but the mistake clearly affects them",type:"environment"},{text:"It varies a lot, no real pattern",type:"consistency"}]},
  {id:"q3",text:"How would you describe your child's decision making on the ball?",options:[{text:"They know what to do but don't back themselves to do it",type:"confidence"},{text:"They react to what is in front of them rather than reading ahead",type:"decision"},{text:"Decent decisions but they need the right environment around them",type:"environment"},{text:"Brilliant one game, completely off the next",type:"consistency"}]},
  {id:"q4",text:"When your child plays against stronger opposition, what do you notice?",options:[{text:"They shrink and take far fewer risks than usual",type:"confidence"},{text:"They panic on the ball and stop reading the game",type:"decision"},{text:"Their level drops but so does everyone in that environment",type:"environment"},{text:"Unpredictable, sometimes they rise to it, sometimes they disappear",type:"consistency"}]},
  {id:"q5",text:"How does your child respond to pressure from coaches or parents on the touchline?",options:[{text:"They tighten up and play even safer to avoid criticism",type:"confidence"},{text:"They try to do what they are told but stop thinking for themselves",type:"decision"},{text:"The environment around them has a big impact on how they play",type:"environment"},{text:"Seems to affect them sometimes but not others",type:"consistency"}]},
  {id:"q6",text:"What happens when your child has a bad game?",options:[{text:"They are really hard on themselves and it affects their confidence for days",type:"confidence"},{text:"They struggle to identify what went wrong or why",type:"decision"},{text:"The mood in the car home has a big impact on how they process it",type:"environment"},{text:"Fine one week, really down the next, no consistency in how they handle it",type:"consistency"}]},
  {id:"q7",text:"If you had to sum up what is missing, what would you say?",options:[{text:"The belief to back their ability when it matters",type:"confidence"},{text:"The ability to read the game and make the right call under pressure",type:"decision"},{text:"The right environment to bring the best out of them",type:"environment"},{text:"Consistency, they have the talent but cannot replicate it reliably",type:"consistency"}]},
];

const barriers = {
  confidence:{name:"The Confidence Barrier",icon:"🧠",tagline:"The ability is there. The belief is not yet.",description:"Your child has genuine quality but something shuts them down when it matters. They do it in training, they know what to do, but in games they take the safe option, go quiet, or disappear under pressure. This is not a talent problem. It is an environment problem. The right environment builds the belief that allows the ability to show up consistently.",insight:"Players who struggle with confidence are often in environments that reward outcomes over process. Every mistake feels final. What they need is a space where trying and failing is part of the design, not something to avoid.",cta:"Inside the Game Intelligence Lab we break down exactly why this happens and what changes it. Start free today."},
  decision:{name:"The Decision Barrier",icon:"⚡",tagline:"They react to the game instead of reading it.",description:"Your child plays what is in front of them rather than what the game needs from them. They are not scanning before the ball arrives, not playing ahead of the situation, and not seeing the picture that would make their decisions quicker and more effective. This is the core of game intelligence and it is entirely coachable.",insight:"Most training environments reward execution. Do the drill correctly, repeat it. But games require reading and deciding, not just doing. Players who have only been trained to execute struggle when the game does not look like the drill.",cta:"The Game Intelligence Lab is built around developing exactly this. Join free and start with our video series on why players freeze and how to change it."},
  environment:{name:"The Environment Barrier",icon:"🌍",tagline:"What surrounds your child shapes what they become.",description:"Your child's development is being shaped by more than just their sessions on the pitch. The car journey home, the reaction to mistakes, the pressure or safety they feel around them, all of it creates the environment that either unlocks their potential or limits it. You already sense this. That instinct is right.",insight:"The environment coach understands that what happens off the pitch shapes what happens on it. This is not about blame. It is about understanding how powerful the right conditions are, and how to create them.",cta:"The Game Intelligence Lab includes a Parent Playbook designed to help you become part of the solution. Join free today."},
  consistency:{name:"The Consistency Barrier",icon:"🎯",tagline:"The potential is clear. Making it reliable is the work.",description:"You can see the quality. Everyone can. But it comes and goes. Against weaker opposition they shine, against stronger opposition they fade. Great one week, barely there the next. This inconsistency is not about effort or attitude. It is about not yet having the game intelligence framework that makes performance repeatable regardless of context.",insight:"Consistent performers are not more talented. They have a deeper understanding of what the game requires from them in any situation. That understanding is built through the right kind of development environment, not through more repetition of the same drills.",cta:"Game intelligence is what makes talent consistent. The Game Intelligence Lab is where that gets built. Join free to get started."},

const tiers = [

function GIBarrier() {
  const [screen, setScreen] = useState("welcome");
  const [currentQ, setCurrentQ] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [barrier, setBarrier] = useState(null);
  const [formData, setFormData] = useState(null);
  const [sel, setSel] = useState(null);
  const [trans, setTrans] = useState(false);
  const [revealed, setRevealed] = useState(false);

  useEffect(()=>{if(screen==="results")setTimeout(()=>setRevealed(true),300);},[screen]);

  const handleAnswer = (type) => {
    if(trans) return;
    setSel(type); setTrans(true);
    setTimeout(()=>{
      const newAns=[...answers,type];
      setAnswers(newAns);
      if(currentQ<barrierQuestions.length-1){setCurrentQ(c=>c+1);setSel(null);setTrans(false);}
      else{
        const counts=newAns.reduce((acc,t)=>{acc[t]=(acc[t]||0)+1;return acc;},{});
        setBarrier(Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0]);
        setScreen("gate"); setSel(null); setTrans(false);
      }
    },380);
  };

  const progress = (currentQ/barrierQuestions.length)*100;
  const b = barrier ? barriers[barrier] : null;

  if(screen==="welcome") return (
    <div style={sharedCard}><div style={card}><div style={topBar}/>
      <Logo sub="Game Intelligence Lab"/>
      <div style={chip()}>Free Diagnostic</div>
      <h1 style={h1}>What's Holding Your Child Back?</h1>
      <p style={body}>Answer 7 questions about how your child performs on the pitch. In under 2 minutes you'll discover the one barrier limiting their development right now and exactly what to do about it.</p>
      <button style={btn} onClick={()=>setScreen("questions")}>Find Out What's Holding Them Back</button>
      <p style={{color:"#252525",fontSize:"11px",textAlign:"center",marginTop:"14px"}}>Takes 2 minutes. Written by a coach with 20 years of player development experience.</p>
    </div></div>
  );

  if(screen==="questions") {
    const q=barrierQuestions[currentQ];
    return (
      <div style={sharedCard}><div style={card}><div style={topBar}/>
        <Logo sub="Game Intelligence Lab"/>
        <div style={{height:"2px",background:"#1a1a1a",borderRadius:"2px",marginBottom:"28px",overflow:"hidden"}}>
          <div style={{height:"100%",background:"linear-gradient(90deg,#e63329,#ff5252)",width:`${progress}%`,transition:"width 0.4s ease"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:"6px"}}>
          <span style={{color:"#e63329",fontSize:"9px",letterSpacing:"2px",textTransform:"uppercase",fontWeight:"700"}}>Question {currentQ+1} of {barrierQuestions.length}</span>
          <span style={{color:"#333",fontSize:"12px"}}>{Math.round(progress)}% complete</span>
        </div>
        <div style={{color:"#fff",fontSize:"17px",fontWeight:"700",lineHeight:1.45,marginBottom:"22px"}}>{q.text}</div>
        {q.options.map((opt,i)=>{
          const isSel=sel===opt.type&&trans;
          return (
            <div key={i} onClick={()=>handleAnswer(opt.type)} style={{background:isSel?"rgba(230,51,41,0.12)":"#111",border:`1px solid ${isSel?"#e63329":"#1c1c1c"}`,borderRadius:"10px",padding:"13px 16px",marginBottom:"9px",cursor:"pointer",color:isSel?"#fff":"#777",fontSize:"14px",lineHeight:1.5,display:"flex",alignItems:"center",gap:"12px",transition:"all 0.18s"}}>
              <div style={{width:"7px",height:"7px",borderRadius:"50%",background:isSel?"#e63329":"#222",flexShrink:0}}/>{opt.text}
            </div>
          );
        })}
      </div></div>
    );
  }

  if(screen==="gate") return (
    <div style={sharedCard}><div style={card}><div style={topBar}/>
      <Logo sub="Game Intelligence Lab"/>
      <GateForm title="We've identified the barrier holding your child back." sub="Your Result Is Ready" onSubmit={fd=>{setFormData(fd);setScreen("results");}}/>
    </div></div>
  );

  if(screen==="results"&&b&&formData) return (
    <div style={sharedCard}><div style={{...card,maxWidth:"580px",opacity:revealed?1:0,transform:revealed?"translateY(0)":"translateY(12px)",transition:"all 0.5s ease"}}><div style={topBar}/>
      <Logo sub="Game Intelligence Lab"/>
      <div style={chip()}>Diagnostic Complete</div>
      <div style={{background:"rgba(230,51,41,0.06)",border:"1px solid rgba(230,51,41,0.2)",borderRadius:"14px",padding:"24px",marginBottom:"24px",textAlign:"center"}}>
        <div style={{fontSize:"40px",marginBottom:"12px"}}>{b.icon}</div>
        <div style={{color:"#e63329",fontSize:"10px",letterSpacing:"2.5px",textTransform:"uppercase",fontWeight:"700",marginBottom:"8px"}}>{formData.childName}'s Primary Barrier</div>
        <div style={{color:"#fff",fontSize:"22px",fontWeight:"800",letterSpacing:"-0.3px",marginBottom:"6px"}}>{b.name}</div>
        <div style={{color:"#555",fontSize:"14px",fontStyle:"italic"}}>{b.tagline}</div>
      </div>
      <div style={{background:"#0a0a0a",border:"1px solid #181818",borderRadius:"12px",padding:"20px",marginBottom:"16px"}}>
        <div style={{color:"#444",fontSize:"9px",letterSpacing:"2px",textTransform:"uppercase",marginBottom:"10px",fontWeight:"700"}}>What This Means</div>
        <p style={{color:"#777",fontSize:"14px",lineHeight:1.75,margin:0}}>{b.description}</p>
      </div>
      <div style={{background:"#0a0a0a",border:"1px solid #181818",borderRadius:"12px",padding:"20px",marginBottom:"24px"}}>
        <div style={{color:"#444",fontSize:"9px",letterSpacing:"2px",textTransform:"uppercase",marginBottom:"10px",fontWeight:"700"}}>The Coach's Insight</div>
        <p style={{color:"#555",fontSize:"14px",lineHeight:1.75,margin:0}}>{b.insight}</p>
      </div>
      <div style={divider}/>
      <div style={{textAlign:"center",marginBottom:"20px"}}>
        <div style={{color:"#fff",fontSize:"17px",fontWeight:"800",marginBottom:"6px"}}>This is exactly what the Game Intelligence Lab is built for.</div>
        <div style={{color:"#555",fontSize:"13px",lineHeight:1.6}}>Join free today. Start with our video series on why players freeze and practical skills to work on this week. No credit card needed.</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px",marginBottom:"24px"}}>
        {tiers.map((tier,i)=>(
          <div key={i} style={{background:tier.highlight?"rgba(230,51,41,0.08)":"#0a0a0a",border:`1px solid ${tier.highlight?"rgba(230,51,41,0.35)":"#181818"}`,borderRadius:"12px",padding:"16px 12px",position:"relative",textAlign:"center"}}>
            {tier.highlight&&<div style={{position:"absolute",top:"-10px",left:"50%",transform:"translateX(-50%)",background:"#e63329",color:"#fff",fontSize:"8px",fontWeight:"800",letterSpacing:"1.5px",textTransform:"uppercase",padding:"3px 8px",borderRadius:"10px"}}>Most Popular</div>}
            <div style={{color:tier.highlight?"#fff":"#555",fontSize:"11px",fontWeight:"700",letterSpacing:"1px",textTransform:"uppercase",marginBottom:"6px"}}>{tier.name}</div>
            <div style={{color:tier.highlight?"#e63329":"#fff",fontSize:"20px",fontWeight:"800",marginBottom:"2px"}}>{tier.price}</div>
            <div style={{color:"#333",fontSize:"10px",marginBottom:"12px"}}>{tier.priceNote}</div>
            {tier.features.map((f,fi)=><div key={fi} style={{color:"#444",fontSize:"11px",lineHeight:1.5,marginBottom:"4px",textAlign:"left"}}>{f}</div>)}
            {tier.note&&<div style={{color:"#e63329",fontSize:"10px",marginTop:"8px",fontWeight:"700"}}>{tier.note}</div>}
          </div>
        ))}
      </div>
      <a href="https://www.skool.com/ngc-player-lab-5149" target="_blank" rel="noopener noreferrer" style={{textDecoration:"none"}}>
        <button style={{...btn,marginBottom:"10px"}}>Join the Game Intelligence Lab Free</button>
      </a>
      <p style={{color:"#1a1a1a",fontSize:"11px",textAlign:"center",marginTop:"8px"}}>Coach Kurtis &nbsp; Game Intelligence Lab &nbsp; coachkurtis.com</p>
    </div></div>
  );
  return null;
}

function App() { return <GIBarrier/>; }

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
