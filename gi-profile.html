function RadarChart({scores}) {
  const size=240, center=120, maxR=85;
  const dims = Object.keys(scores);
  const n = dims.length;
  const pt = (i,v,r) => { const a=(Math.PI*2*i)/n-Math.PI/2; return {x:center+((v/4)*r)*Math.cos(a),y:center+((v/4)*r)*Math.sin(a)}; };
  const axPts = dims.map((_,i)=>{const a=(Math.PI*2*i)/n-Math.PI/2;return{x:center+maxR*Math.cos(a),y:center+maxR*Math.sin(a)};});
  const lblPts = dims.map((d,i)=>{const a=(Math.PI*2*i)/n-Math.PI/2;const r=maxR+22;return{x:center+r*Math.cos(a),y:center+r*Math.sin(a),label:dimInfo[d].short};});
  const sPts = dims.map((d,i)=>pt(i,scores[d],maxR));
  const path = sPts.map((p,i)=>`${i===0?"M":"L"} ${p.x} ${p.y}`).join(" ")+" Z";
  const grids = [1,2,3,4].map(lv=>{const ps=dims.map((_,i)=>pt(i,lv,maxR));return ps.map((p,i)=>`${i===0?"M":"L"} ${p.x} ${p.y}`).join(" ")+" Z";});
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:"block",margin:"0 auto"}}>
      {grids.map((d,i)=><path key={i} d={d} fill="none" stroke={i===3?"#333":"#1e1e1e"} strokeWidth={i===3?1.5:0.8}/>)}
      {axPts.map((p,i)=><line key={i} x1={center} y1={center} x2={p.x} y2={p.y} stroke="#2a2a2a" strokeWidth="1"/>)}
      <path d={path} fill="rgba(230,51,41,0.15)" stroke="#e63329" strokeWidth="2" style={{filter:"drop-shadow(0 0 8px rgba(230,51,41,0.4))"}}/>
      {sPts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="5" fill="#e63329" style={{filter:"drop-shadow(0 0 4px rgba(230,51,41,0.8))"}}/>)}
      {lblPts.map((p,i)=><text key={i} x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle" fill="#555" fontSize="11" fontFamily="monospace" fontWeight="700">{p.label}</text>)}
    </svg>
  );
}
